<header id="header">

  <nav>
    {% for item in site.data.settings.menu %}
      <a href="{{ item.url }}"><span>{{ item.name }}</span></a>
    {% endfor %}
  </nav>

  <h1><span>{{ site.data.settings.title }}</span></h1>
  <p class="kicker"><span>{{ site.data.settings.description }}</span></p>

</header>
